<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task & Notes Manager - JS Mini Project</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <button class="mode-toggle">Light Mode: ON</button>

    <div class="container">
        <div class="header">
            <img src="images/note-icon.webp" alt="note-icon">
            <h1 class="title">Task & Notes Manager</h1>
        </div>

        <div class="buttons">
            <button id='new-task-btn'>+ New Task</button>
            <button id='new-note-btn'>+ New Note</button>
        </div>

        <div class="inner-container">
            <div class="task-container">
                <div class="task-header">
                    <h4>✅ Tasks</h4>
                    <div class="task-popup">0</div>
                </div>
                <div class="task-content">

                </div>
                <div class="task-footer">0 tasks in total</div>
            </div>

            <div class="note-container">
                <div class="note-header">
                    <div style="display: flex; justify-content: center; align-items: center; gap: 6px;"><svg
                            xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24"
                            color="currentColor" fill="none" stroke="currentColor" stroke-width="1.5"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M10 11H13.5M10 7H17"></path>
                            <path
                                d="M13 2H12.5C8.72877 2 6.84314 2 5.67157 3.17158C4.5 4.34315 4.5 6.22877 4.5 10V14C4.5 17.7712 4.5 19.6569 5.67157 20.8284C6.84315 22 8.72876 22 12.5 22H13C16.7712 22 18.6569 22 19.8284 20.8284C21 19.6569 21 17.7712 21 14V10C21 6.22877 21 4.34315 19.8284 3.17157C18.6569 2 16.7712 2 13 2Z">
                            </path>
                            <path d="M6 6H3M6 12H3M6 18H3"></path>
                        </svg>
                        <h4> Notes </h4>
                    </div>
                    <div class="note-popup">0</div>
                </div>
                <div class="note-content">

                </div>
                <div class="note-footer">0 notes in total</div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
